<section class="py-16">
  <div class="max-w-6xl mx-auto px-4">
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-12">My Skills</h2>

    <!-- Carousel Container -->
    <div class="relative">
      <!-- Navigation Buttons -->
      <button
        (click)="prevSlide()"
        class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-4 z-10 bg-white rounded-full p-2 shadow-lg hover:shadow-xl transition-shadow duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
        aria-label="Previous skills"
      >
        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </button>

      <button
        (click)="nextSlide()"
        class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-4 z-10 bg-white rounded-full p-2 shadow-lg hover:shadow-xl transition-shadow duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
        aria-label="Next skills"
      >
        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5l7 7-7 7"
          ></path>
        </svg>
      </button>

      <!-- Skills Carousel -->
      <div class="overflow-hidden">
        <div
          class="flex transition-transform duration-500 ease-in-out"
          [style.transform]="'translateX(-' + (currentIndex() * 100) / 3 + '%)'"
        >
          <div
            class="flex-none w-full md:w-1/3 px-4"
            *ngFor="let skill of skills(); trackBy: trackByFn"
          >
            <div
              class="bg-gradient-to-br from-blue-50 to-indigo-100 rounded-xl p-6 h-80 flex flex-col justify-between hover:shadow-lg transition-shadow duration-300 cursor-pointer transform hover:-translate-y-1"
              (click)="openModal(skill)"
            >
              <div>
                <div class="text-4xl mb-4">{{ skill.icon }}</div>
                <h3 class="text-xl font-semibold text-gray-800 mb-2">{{ skill.name }}</h3>
                <p class="text-gray-600 text-sm mb-4 line-clamp-3">{{ skill.description }}</p>
              </div>

              <!-- Progress Bar -->
              <div>
                <div class="flex justify-between text-sm text-gray-600 mb-2">
                  <span>Proficiency</span>
                  <span>{{ skill.level }}%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                  <div
                    class="bg-gradient-to-r from-blue-500 to-indigo-600 h-2 rounded-full transition-all duration-1000 ease-out"
                    [style.width.%]="skill.level"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Dots Indicator -->
      <div class="flex justify-center mt-8 space-x-2">
        <button
          *ngFor="let skill of skills(); let i = index"
          (click)="currentIndex.set(i)"
          class="w-3 h-3 rounded-full transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.bg-blue-500]="i === currentIndex()"
          [class.bg-gray-300]="i !== currentIndex()"
          [attr.aria-label]="'Go to skill ' + (i + 1)"
        ></button>
      </div>
    </div>
  </div>
</section>

<!-- Modal -->
<div
  *ngIf="isModalOpen()"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
  (click)="closeModal()"
>
  <div
    class="bg-white rounded-xl max-w-md w-full max-h-[90vh] overflow-y-auto"
    (click)="$event.stopPropagation()"
  >
    <div class="p-6" *ngIf="selectedSkill() as skill">
      <!-- Modal Header -->
      <div class="flex justify-between items-start mb-6">
        <div class="text-5xl">{{ skill.icon }}</div>
        <button
          (click)="closeModal()"
          class="text-gray-400 hover:text-gray-600 transition-colors duration-200"
          aria-label="Close modal"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>

      <!-- Modal Content -->
      <h3 class="text-2xl font-bold text-gray-800 mb-4">{{ skill.name }}</h3>
      <p class="text-gray-600 mb-6">{{ skill.description }}</p>

      <!-- Proficiency -->
      <div class="mb-6">
        <div class="flex justify-between text-sm text-gray-600 mb-2">
          <span>Proficiency Level</span>
          <span>{{ skill.level }}%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
          <div
            class="bg-gradient-to-r from-blue-500 to-indigo-600 h-3 rounded-full transition-all duration-1000 ease-out"
            [style.width.%]="skill.level"
          ></div>
        </div>
      </div>

      <!-- Technologies -->
      <div>
        <h4 class="text-lg font-semibold text-gray-800 mb-3">Technologies & Tools</h4>
        <div class="flex flex-wrap gap-2">
          <span
            *ngFor="let tech of skill.technologies"
            class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium"
          >
            {{ tech }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

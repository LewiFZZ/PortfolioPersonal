<header class="sticky top-0 z-50 bg-white shadow-md border-b border-gray-200">
  <div
    class="max-w-4xl mx-auto px-4 py-4 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
  >
    <h1 class="text-2xl font-bold text-gray-900 text-center sm:text-left">
      Levi Josué Candeias de Figueiredo
    </h1>
    <nav class="flex flex-wrap justify-center gap-3 text-sm sm:justify-end sm:gap-6">
      @for (link of navLinks; track link.href) {
        <a
          [href]="'#' + link.href"
          [class]="
            activeSection() === link.href
              ? 'text-blue-600 font-semibold border-b-2 border-blue-600 pb-0.5'
              : 'text-gray-700 hover:text-blue-600 transition-colors'
          "
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </div>
  <div class="h-0.5 bg-gray-100 w-full">
    <div
      class="h-full bg-blue-600 transition-all duration-100"
      [style.width.%]="scrollProgress()"
    ></div>
  </div>
</header>
